[widget.cpu]
type = "sysmon"
stat = "cpu_usage"

[widget.cpu-graph]
type       = "sysmon"
stat       = "cpu_usage"
display    = "graph"
show_label = false

[widget.temp]
type = "sysmon"
stat = "cpu_temp"

[widget.ram]
type = "sysmon"
stat = "ram_used"

[widget.disk]
type = "sysmon"
stat = "disk_pct"
path = "/"

[widget.wifi-download]
type      = "sysmon"
stat      = "net_rx"
interface = "wlan0"

[widget.wifi-upload]
type                  = "sysmon"
stat                  = "net_tx"
network_speed_unit    = "mb"      # auto | kb | mb
network_speed_compact = true      # show "1.2M" instead of "1.2 MB/s"