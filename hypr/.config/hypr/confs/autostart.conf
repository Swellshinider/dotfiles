#################
### AUTOSTART ###
#################

# Background Programs
exec-once = pidof hyprlock || hyprlock
exec-once = hypridle
exec-once = blueman-applet
exec-once = nm-applet --indicator
exec-once = swaync &
exec-once = copyq &
exec-once = waybar
exec-once = bitwarden-desktop &

#######################
### USING HYPRPAPER ###
#######################
# exec-once = hyprpaper
# exec-once = $HOME/.config/hypr/scripts/hyprpaper_randomize.sh

#######################
### USING NOCTALIA  ###
#######################
exec-once = noctalia &

# Misc
exec-once = [workspace 1 silent] $browser
exec-once = [workspace 3 silent] $terminal

# GTK theme settings
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Breeze'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'